apiVersion: v1
kind: Secret
metadata:
  name: evalio-secrets
  labels:
    app: evalio
type: Opaque
data:
  MONGODB_URL: mongodb://mongodb-service:27017/evalio
  JWT_TOKEN_SECRET: [JWT_TOKEN_SECRET]
  JWT_TOKEN_SIGNUP_MAIL_SECRET: [JWT_TOKEN_SIGNUP_MAIL_SECRET]
  JWT_RESET_PASSWORD_SECRET: [JWT_RESET_PASSWORD_SECRET]
  NODEMAILER_MAIL: [EMAIL_ADDRESS]
  NODEMAIL_APP_PASSWORD: [PASSWORD]
