apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: evalio-ingress
  labels:
    app: evalio
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: evalio.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: evalio-server-service
                port:
                  number: 8000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: evalio-server-service
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: evalio-client-service
                port:
                  number: 3000
